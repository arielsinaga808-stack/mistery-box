<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENG4D GOD BOX</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>
<audio id="loseSound" src="https://assets.mixkit.co/sfx/preview/mixkit-losing-bleeps-2026.mp3"></audio>

<style>
body{
    margin:0;
    background:radial-gradient(circle,#3b0000,#000);
    overflow:hidden;
    font-family:sans-serif;
    color:white;
}

/* PETIR */
.flash{
    position:fixed;
    width:100%;
    height:100%;
    background:white;
    opacity:0;
    pointer-events:none;
    animation:flash 5s infinite;
}
@keyframes flash{
    0%,95%,100%{opacity:0;}
    96%{opacity:0.8;}
}

/* GRID HADIAH */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    position:absolute;
    width:100%;
    height:100%;
    padding:20px;
    box-sizing:border-box;
}

.small-box{
    background:linear-gradient(135deg,#ff0000,#800000);
    border:2px solid gold;
    border-radius:10px;
    box-shadow:0 0 10px red;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* BOX UTAMA */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.big-box{
    width:180px;
    height:180px;
    background:linear-gradient(135deg,#ff0000,#800000);
    border:4px solid gold;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    box-shadow:0 0 30px red,0 0 60px gold;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
}

/* INPUT */
input{
    margin-top:20px;
    padding:12px;
    width:220px;
    border-radius:20px;
    border:2px solid cyan;
    background:black;
    color:white;
    text-align:center;
    box-shadow:0 0 10px cyan;
}

/* BUTTON */
button{
    margin-top:10px;
    padding:12px 20px;
    border-radius:30px;
    border:2px solid cyan;
    background:black;
    color:cyan;
    cursor:pointer;
    box-shadow:0 0 15px cyan;
}
button:hover{
    background:cyan;
    color:black;
}

/* RESULT */
#resultImg{
    width:200px;
    display:none;
    margin-top:15px;
    animation:zoom 0.5s;
}
@keyframes zoom{
    from{transform:scale(0);}
    to{transform:scale(1);}
}

/* COIN */
.coin{
    position:absolute;
    width:15px;
    height:15px;
    background:gold;
    border-radius:50%;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(-100vh);}
    to{transform:translateY(100vh);}
}
</style>
</head>

<body>

<div class="flash"></div>

<!-- GRID HADIAH -->
<div class="grid">
<script>
for(let i=0;i<9;i++){
    document.write('<div class="small-box"></div>');
}
</script>
</div>

<!-- BOX UTAMA -->
<div class="center">
    <div class="big-box" id="box">🎁</div>
    <br>
    <input id="kodeInput" placeholder="MASUKKAN KODE">
    <br>
    <button onclick="claim()">BUKA SEKARANG</button>
    <img id="resultImg">
</div>

<script>
// FIREBASE
const config={
 apiKey:"AIzaSyDZH--oPWAhe3JhrPdWiAkkAecZFjefhV0",
 databaseURL:"https://geng4d-mistery-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(config);
const db=firebase.database();

// COIN
for(let i=0;i<30;i++){
 let c=document.createElement("div");
 c.className="coin";
 c.style.left=Math.random()*100+"%";
 c.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(c);
}

// CLAIM
function claim(){
 let code=kodeInput.value.toUpperCase().trim();
 if(!code) return alert("Masukkan kode!");

 db.ref('settings/codes/'+code).once('value')
 .then(snap=>{
  let data=snap.val();

  if(!data) return alert("Kode tidak valid!");
  if(data.used) return alert("Kode sudah dipakai!");

  db.ref('settings/winrate').once('value')
  .then(wrSnap=>{
    let wr=wrSnap.val()||100;
    let rand=Math.floor(Math.random()*100)+1;

    box.style.transform="scale(1.2) rotate(10deg)";

    setTimeout(()=>{

        if(rand<=wr){
            winSound.play();

            let p=data.prize.toLowerCase();

            if(p.includes("mobil")){
                resultImg.src="https://cdn-icons-png.flaticon.com/512/743/743922.png";
            }else if(p.includes("uang")){
                resultImg.src="https://cdn-icons-png.flaticon.com/512/2331/2331941.png";
            }else{
                resultImg.src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png";
            }

            resultImg.style.display="block";
            alert("🎉 MENANG: "+data.prize);

        }else{
            loseSound.play();
            alert("💣 ZONK!");
        }

        db.ref('settings/codes/'+code).update({used:true});

        box.style.transform="";

    },800);

  });

 });
}
</script>

</body>
</html>
