<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISTERY BOX GENG4D - EXCLUSIVE</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --red-angpau: linear-gradient(135deg, #ff0000 0%, #8b0000 100%); --neon: #00f2ff; }
        body { margin: 0; background: radial-gradient(circle, #3d0000 0%, #000 100%); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; transition: 0.5s; background-size: cover; }
        .stage { text-align: center; width: 100%; max-width: 500px; }
        .title-mistery { font-size: 1.2rem; letter-spacing: 5px; color: #ffd700; }
        .title-geng4d { font-size: 3.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(4px 4px 0px #4d3300); margin-top: -10px; font-weight: 900; }
        .angpau { width: 200px; height: 280px; background: var(--red-angpau); border-radius: 20px; border: 3px solid #ffd700; margin: 20px auto; display: flex; align-items: center; justify-content: center; animation: float 3s ease-in-out infinite; position: relative; box-shadow: 0 20px 50px rgba(255,0,0,0.4); }
        .angpau-logo { width: 100px; height: 100px; border: 4px double #ffd700; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .input-box { width: 80%; background: rgba(0,0,0,0.8); border: 2px solid var(--neon); border-radius: 30px; padding: 12px; color: #fff; text-align: center; margin-top: 20px; outline: none; box-shadow: 0 0 10px var(--neon); text-transform: uppercase; font-weight: bold; }
        .btn-buka { width: 180px; padding: 12px; margin-top: 20px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: 900; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px var(--neon); }
        .btn-buka:hover { background: var(--neon); color: #000; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>
    <div class="stage">
        <div class="title-mistery">MISTERY BOX</div>
        <div class="title-geng4d">GENG4D</div>
        <div class="angpau"><div class="angpau-logo"><div style="font-size:40px;color:#ffd700">庚</div><div style="font-weight:900;color:#ffd700">4D</div></div></div>
        <input type="text" class="input-box" id="kodeInput" placeholder="MASUKKAN KODE">
        <button class="btn-buka" onclick="claimReward()">BUKA SEKARANG</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZH--oPWAhe3JhrPdWiAkkAecZFjefhV0",
            projectId: "geng4d-mistery",
            databaseURL: "https://geng4d-mistery-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('settings/background').on('value', s => { 
            if(s.val()) document.body.style.backgroundImage = `url('${s.val()}')`; 
        });

        function claimReward() {
            const code = document.getElementById('kodeInput').value.toUpperCase().trim();
            if(!code) return alert("Masukkan Kode!");

            db.ref('settings/codes/' + code).once('value').then(snap => {
                const data = snap.val();
                if(!data) return alert("❌ KODE TIDAK VALID!");
                if(data.used) return alert("❌ KODE SUDAH PERNAH DIGUNAKAN!");

                db.ref('settings/winrate').once('value').then(wrSnap => {
                    const winrate = wrSnap.val() || 100;
                    if(Math.floor(Math.random() * 100) + 1 <= winrate) {
                        alert("🎉 SELAMAT! ANDA MENDAPATKAN: " + data.prize);
                    } else {
                        alert("💣 MAAF! BELUM BERUNTUNG, COBA LAGI!");
                    }
                    db.ref('settings/codes/' + code).update({ used: true });
                });
            });
        }
    </script>
</body>
</html>
