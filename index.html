<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISTERY BOX GENG4D - EXCLUSIVE</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --gold: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); --red-angpau: linear-gradient(135deg, #ff0000 0%, #8b0000 100%); --neon-border: #00f2ff; }
        body { margin: 0; background: radial-gradient(circle, #3d0000 0%, #000 100%); background-size: cover; background-position: center; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; transition: 0.5s; }
        .stage { position: relative; width: 100%; max-width: 500px; display: flex; flex-direction: column; align-items: center; }
        .title-mistery { font-size: 1.2rem; letter-spacing: 5px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .title-geng4d { font-size: 3.5rem; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(4px 4px 0px #4d3300); margin-top: -10px; }
        .angpau { width: 200px; height: 280px; background: var(--red-angpau); border-radius: 20px; border: 3px solid #ffd700; box-shadow: 0 20px 50px rgba(255,0,0,0.4); display: flex; align-items: center; justify-content: center; animation: float 3s ease-in-out infinite; position: relative; }
        .angpau-logo { width: 110px; height: 110px; border: 4px double #ffd700; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .input-box { width: 250px; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-border); border-radius: 30px; padding: 12px; color: #fff; text-align: center; margin-top: 30px; outline: none; box-shadow: 0 0 15px var(--neon-border); font-weight: bold; }
        .btn-buka { width: 180px; padding: 12px; margin-top: 15px; background: transparent; border: 2px solid var(--neon-border); color: var(--neon-border); font-weight: 900; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        .btn-buka:hover { background: var(--neon-border); color: #000; box-shadow: 0 0 30px var(--neon-border); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div class="stage">
        <div class="title-mistery">MISTERY BOX</div>
        <div class="title-geng4d">GENG4D</div>
        <div class="angpau"><div class="angpau-logo"><div style="font-size:40px; color:#ffd700">庚</div><div style="color:#ffd700; font-weight:900">4D</div></div></div>
        <input type="text" class="input-box" id="kodeInput" placeholder="MASUKKAN KODE">
        <button class="btn-buka" onclick="claimReward()">BUKA SEKARANG</button>
    </div>

    <!-- FIREBASE SDK -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://geng4d-mistery-default-rtdb.asia-southeast1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. UPDATE BACKGROUND OTOMATIS DARI PANEL
        db.ref('settings/background').on('value', (s) => {
            if(s.val()) document.body.style.backgroundImage = `url('${s.val()}')`;
        });

        // 2. LOGIKA KLAIM HADIAH & WINRATE
        function claimReward() {
            const code = document.getElementById('kodeInput').value.toUpperCase().trim();
            if(!code) return alert("Masukkan Kode!");

            db.ref('settings/codes/' + code).once('value').then((snap) => {
                const data = snap.val();
                if (data) {
                    if (data.used) return alert("KODE SUDAH PERNAH DIGUNAKAN!");

                    // Ambil Winrate dari Panel
                    db.ref('settings/winrate').once('value').then((wrSnap) => {
                        const wr = wrSnap.val() || 100;
                        const random = Math.floor(Math.random() * 100) + 1;

                        if (random <= wr) {
                            alert("SELAMAT! ANDA MENANG: " + data.prize);
                        } else {
                            alert("ZONK! COBA LAGI LAIN KALI.");
                        }
                        // Update status kode jadi terpakai
                        db.ref('settings/codes/' + code).update({ used: true });
                    });
                } else {
                    alert("KODE SALAH!");
                }
            });
        }
    </script>
</body>
</html>
