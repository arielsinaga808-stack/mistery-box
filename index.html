<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISTERY BOX GENG4D</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #1a1a2e, #000);
  color:#00f2ff;
  text-align:center;
}
.box {
  width:120px;height:120px;
  background:purple;
  display:inline-block;
  margin:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>MISTERY BOX GENG4D</h1>

<div>
  <div class="box" data-index="0"></div>
  <div class="box" data-index="1"></div>
  <div class="box" data-index="2"></div>
</div>

<input id="kodeInput" placeholder="Masukkan kode">
<button id="openBtn">Buka</button>

<div id="resultPopup" style="display:none;">
  <h2 id="resultText"></h2>
  <img id="resultImg" width="100">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "geng4d-mistery.firebaseapp.com",
  databaseURL: "https://geng4d-mistery-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "geng4d-mistery"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const openBtn = document.getElementById("openBtn");
const kodeInput = document.getElementById("kodeInput");

openBtn.onclick = () => {
  const kode = kodeInput.value.toUpperCase();

  db.ref("codes/" + kode).once("value", snap => {
    const data = snap.val();

    if (!data) return alert("Kode tidak ada");

    alert("Hadiah: " + data.prize);
  });
};
</script>

</body>
</html>
