<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE ADMIN PANEL - GENG4D</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        #loginBox { width: 100%; max-width: 350px; background: #111; padding: 30px; border-radius: 15px; border: 1px solid #ffd700; text-align: center; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        #adminPanel { display: none; width: 100%; max-width: 450px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h2 { color: #ffd700; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #888; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; outline: none; margin-bottom: 5px; }
        input:focus { border-color: #ffd700; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-login { background: #ffd700; color: black; font-size: 16px; }
        .btn-save { background: #00f2ff; color: black; margin-top: 20px; }
        .btn-logout { background: #ff4444; color: white; margin-top: 30px; font-size: 12px; width: auto; padding: 8px 15px; border-radius: 5px; }
        .code-list { margin-top: 20px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .code-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #ffd700; }
        .status-active { color: #0f0; font-size: 12px; font-weight: bold; }
        .status-used { color: #ff4444; font-size: 12px; font-weight: bold; }
        .btn-del { background: none; border: none; color: #666; cursor: pointer; font-size: 18px; width: auto; padding: 0; margin: 0; }
        .btn-del:hover { color: red; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loginBox">
        <div style="font-size: 40px; margin-bottom: 10px;">🔐</div>
        <h2>ADMIN LOGIN</h2>
        <div class="input-group">
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
        </div>
        <button class="btn-login" onclick="handleLogin()">MASUK SYSTEM</button>
    </div>

    <div id="adminPanel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 18px;">GENG4D PANEL</h2>
            <button class="btn-logout" onclick="location.reload()">LOGOUT</button>
        </div>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <!-- SETTING BACKGROUND & WINRATE -->
        <div class="input-group">
            <label>URL Gambar Background</label>
            <input type="text" id="bgUrl" placeholder="https://link-gambar.com">
            
            <label style="margin-top:10px">Winrate Hadiah (1-100%)</label>
            <input type="number" id="winRate" placeholder="Contoh: 50" min="1" max="100">
        </div>
        <button class="btn-save" onclick="updateSettings()">UPDATE SETTINGS</button>

        <hr style="border: 0.5px solid #333; margin: 30px 0;">

        <!-- MANAJEMEN KODE -->
        <h3>KODE & HADIAH</h3>
        <div class="input-group">
            <input type="text" id="newCode" placeholder="KODE (Contoh: GENG100)" style="text-transform: uppercase;">
            <input type="text" id="newPrize" placeholder="NAMA HADIAH (Contoh: SALDO 50K)">
            <button onclick="saveCode()" style="background: #ffd700; color: black; margin-top: 10px;">TAMBAHKAN KODE</button>
        </div>

        <div id="codeList" class="code-list"></div>
    </div>

    <!-- SDK FIREBASE VERSI 8 (STABLE) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZH--oPWAhe3JhrPdWiAkkAecZFjefhV0",
            authDomain: "geng4d-mistery.firebaseapp.com",
            databaseURL: "https://geng4d-mistery-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "geng4d-mistery",
            storageBucket: "geng4d-mistery.firebasestorage.app",
            messagingSenderId: "1084140719254",
            appId: "1:1084140719254:web:88c9ee556a5cdc63f606b7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "admin" && p === "admin123") {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadData();
            } else { alert("Login Gagal!"); }
        }

        function loadData() {
            // Load Background & Winrate
            db.ref('settings').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('bgUrl').value = data.background || "";
                    document.getElementById('winRate').value = data.winrate || 100;
                    renderCodes(data.codes);
                }
            });
        }

        function updateSettings() {
            const bg = document.getElementById('bgUrl').value;
            const wr = document.getElementById('winRate').value;
            db.ref('settings').update({ 
                background: bg,
                winrate: wr 
            }).then(() => alert("Settings Berhasil Diupdate!"));
        }

        function saveCode() {
            const code = document.getElementById('newCode').value.toUpperCase().trim();
            const prize = document.getElementById('newPrize').value.trim();
            if(!code || !prize) return alert("Lengkapi data!");

            db.ref('settings/codes/' + code).set({
                code: code,
                prize: prize,
                used: false,
                createdAt: new Date().toLocaleString()
            }).then(() => {
                document.getElementById('newCode').value = "";
                document.getElementById('newPrize').value = "";
                alert("Kode Berhasil Ditambahkan!");
            });
        }

        function renderCodes(codes) {
            const container = document.getElementById('codeList');
            container.innerHTML = "";
            if(!codes) return;
            Object.keys(codes).reverse().forEach(key => {
                const item = codes[key];
                container.innerHTML += `
                    <div class="code-item">
                        <div style="flex:1">
                            <div style="font-weight: bold; color:#ffd700">${item.code}</div>
                            <div style="font-size: 11px;">Hadiah: ${item.prize}</div>
                            <span class="${item.used ? 'status-used' : 'status-active'}">${item.used ? '● TERPAKAI' : '● TERSEDIA'}</span>
                        </div>
                        <button class="btn-del" onclick="deleteCode('${key}')">🗑️</button>
                    </div>`;
            });
        }

        function deleteCode(key) { if(confirm("Hapus kode ini?")) db.ref('settings/codes/' + key).remove(); }
    </script>
</body>
</html>
