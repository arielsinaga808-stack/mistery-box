<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MISTERY BOX GENG4D</title>

<!-- ✅ FIREBASE SDK (FIX PENTING) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background: radial-gradient(circle,#3d0000,#000);
    font-family: 'Montserrat', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box {
    text-align:center;
}

input {
    padding:12px;
    width:250px;
    border-radius:20px;
    border:2px solid cyan;
    background:#000;
    color:#fff;
    text-align:center;
    font-weight:bold;
    margin-top:20px;
}

button {
    margin-top:15px;
    padding:12px 20px;
    border-radius:30px;
    border:2px solid cyan;
    background:transparent;
    color:cyan;
    font-weight:bold;
    cursor:pointer;
}

button:hover {
    background:cyan;
    color:black;
}
</style>
</head>

<body>

<div class="box">
    <h1>🎁 MISTERY BOX GENG4D</h1>
    <input type="text" id="kodeInput" placeholder="MASUKKAN KODE">
    <br>
    <button onclick="claimReward()">BUKA SEKARANG</button>
</div>

<script>
// ✅ CONFIG FIREBASE (FIX)
const firebaseConfig = {
    apiKey: "AIzaSyDZH--oPWAhe3JhrPdWiAkkAecZFjefhV0",
    authDomain: "geng4d-mistery.firebaseapp.com",
    databaseURL: "https://geng4d-mistery-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "geng4d-mistery"
};

// ✅ INIT
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅ AUTO LOAD BACKGROUND
db.ref('settings/background').on('value', (snap)=>{
    const bg = snap.val();
    console.log("BG:", bg);

    if(bg && bg.trim() !== ""){
        document.body.style.backgroundImage = `url('${bg}')`;
    }
});

// ✅ CLAIM FUNCTION (SUDAH FIX TOTAL)
function claimReward(){
    const input = document.getElementById('kodeInput');
    const code = input.value.toUpperCase().trim();

    console.log("INPUT:", code);

    if(!code){
        alert("Masukkan kode!");
        return;
    }

    db.ref('settings/codes/' + code).once('value')
    .then(snapshot => {

        const data = snapshot.val();
        console.log("DATA:", data);

        if(!data){
            alert("❌ KODE TIDAK VALID!");
            return;
        }

        if(data.used){
            alert("⚠️ KODE SUDAH DIGUNAKAN!");
            return;
        }

        // ambil winrate
        db.ref('settings/winrate').once('value')
        .then(wrSnap => {

            const winrate = wrSnap.val() || 100;
            const random = Math.floor(Math.random()*100)+1;

            console.log("WR:", winrate, "RAND:", random);

            if(random <= winrate){
                alert("🎉 SELAMAT! ANDA MENANG:\n" + data.prize);
            } else {
                alert("💣 ZONK! COBA LAGI!");
            }

            // tandai sudah dipakai
            db.ref('settings/codes/' + code).update({
                used: true
            });

            input.value = "";

        });

    })
    .catch(err=>{
        console.error(err);
        alert("❌ ERROR: "+err.message);
    });
}
</script>

</body>
</html>
